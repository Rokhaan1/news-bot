name: News Bot

# Runs on GitHub's own schedule (self-contained, no external trigger needed),
# plus manual/dispatch runs. Double-posting is prevented in the app: news posts
# are gated by POST_SLOTS + slots_done, and the daily fact/football posts by
# their *_date guards, so extra runs in a slot post at most once.
on:
  workflow_dispatch: {}
  schedule:
    # All times UTC. Several ticks per slot absorb GitHub's scheduler delay.
    - cron: '0,20,40 14 * * *'   # Afghan-evening slot   (~18:30 Kabul)
    - cron: '0,20,40 16 * * *'   # UK late-afternoon slot (~17:00 London)
    - cron: '0,20,40 19 * * *'   # US noon/afternoon slot (12:00 PT / 15:00 ET)
    - cron: '0 15,17,20 * * *'   # catch-up ticks if a slot's runs were delayed

# Prevent overlapping runs
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allows committing state.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Remember what was posted
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "update post state" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push
