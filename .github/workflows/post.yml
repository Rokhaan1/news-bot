name: News Bot

# Triggered ONLY by cron-job.org (reliable 15-min) + manual runs.
# GitHub's own schedule is intentionally removed to avoid double-posting.
on:
  workflow_dispatch: {}

# Prevent overlapping runs
concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allows committing state.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Remember what was posted
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "update post state" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push
