name: News Bot

# Runs automatically on a schedule (UTC times). No PC needed.
# These 4 times = a spread across the day. Adjust as you like.
on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC
    - cron: "0 11 * * *"   # 11:00 UTC
    - cron: "0 15 * * *"   # 15:00 UTC
    - cron: "0 19 * * *"   # 19:00 UTC
  workflow_dispatch: {}     # also lets you run it manually with one click

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allows committing posted.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python main.py

      - name: Remember what was posted
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posted.json
          git commit -m "update post history" || echo "nothing to commit"
          git push
